analysis:
  test_split: 0.20
  significance_level: 0.05
  fdr_method: "fdr_bh"
  min_effect_size: 0.1
  top_k_features: [1, 3, 5, 10, 20]
  random_seed: 42

activation_patching:
  start_layer: 20
  end_layer: 31
  features_to_test: [1, 3, 5, 10, 20]
  scale_factors: [0.0, 0.5]

simulator_validation:
  num_clamped_rollouts: 100
  num_baseline_rollouts: 100
  top_k_features: 5
  scale_factor: 0.0
  target_category: ""
  hazard_category: ""
  condition_group: ""
  condition_names: []
  allowed_suites: []
  allowed_task_specs: []
  trigger_mode: "always"
  trigger_threshold: null
  trigger_start_step: 0
  trigger_end_step: null
  trigger_latch: true

monitor:
  methods: ["logistic_regression", "threshold_weighted_sum"]
  evaluation_mode: "step"
  split_mode: "episode"
  task_eval_mode: "single"
  task_eval_repeats: 5
  task_eval_test_groups: 0
  calibration_method: "none"
  calibration_split: 0.15
  threshold_selection_metric: "cost_weighted_f1"
  threshold_grid_size: 101
  ece_num_bins: 15
  telemetry_window_steps: 10
  operating_point_false_alarm_budgets: [0.01, 0.02, 0.05, 0.10]
  feature_export_top_k: 20
  prediction_target: "violation"
  future_horizon: 25
  min_prefix: 1
  prefix_stride: 1
  pareto_threshold_steps: 50

baselines:
  random: true
  force_threshold: true
  force_threshold_value: 30.0
  telemetry_lr: true
  raw_activation_lr: true
  raw_activation_mlp: true
  raw_mlp_hidden: 256
