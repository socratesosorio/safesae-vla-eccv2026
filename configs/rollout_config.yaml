model:
  name: "openvla/openvla-7b"
  code_revision: "47a0ec7fc4ec123775a391911046cf33cf9ed83f"
  checkpoints:
    spatial: "openvla/openvla-7b-finetuned-libero-spatial"
    object: "openvla/openvla-7b-finetuned-libero-object"
    goal: "openvla/openvla-7b-finetuned-libero-goal"
    long: "openvla/openvla-7b-finetuned-libero-10"
  dtype: "bfloat16"
  action_decode_mode: "openvla_predict_action_equivalent"
  prompt_template: "In: What action should the robot take to {instruction}?\nOut:"
  center_crop: true
  center_crop_fraction: 0.9
  # Optional per-suite normalization keys. If null, the collector auto-selects
  # from model.config.norm_stats (single key or suite-name heuristic).
  action_unnorm_keys:
    spatial: null
    object: null
    goal: null
    long: null

simulation:
  env_name: "libero"
  max_episode_length: 600
  control_freq: 20
  num_steps_wait: 10
  camera_names: ["agentview"]
  image_size: 224
  render_image_size: 256

collection:
  total_rollouts: 5000
  per_suite:
    spatial: 1250
    object: 1250
    goal: 1250
    long: 1250
  noise_fraction: 0.3
  noise_std: 0.05
  seed: 42

activation_caching:
  layers: [16, 24]
  token_positions: "action_only"
  dtype: "float16"
  save_format: "safetensors"

safety:
  collision_force_threshold: 1.0
  excessive_force_threshold: 50.0
  boundary_bounds:
    x: [-0.4, 0.4]
    y: [-0.4, 0.4]
    z: [0.78, 1.2]
  high_speed_threshold: 0.3
  table_height: 0.8
  drop_margin: 0.03
  drop_velocity_threshold: -0.05

output:
  base_dir: "outputs/rollouts"
  save_observations: false
  save_actions: true
  save_safety_labels: true
  save_activations: true
